<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root {
    --cq-red: #ff3e3e;
    --cq-white: #e8e8e8;
    --cq-green-neon: #00ff88;
    --cq-green-muted: #3fb950;
    --cq-purple: #b967ff;
  }

  /* Override theme --accent → muted green (for the dotted title dividers) */
  html body,
  html[data-theme] body {
    --accent: #3fb950 !important;
  }

  /* BODY TEXT → WHITE */
  body, p, li, td, th, blockquote,
  .post-content, .post-content p, .post-content li,
  .post-meta, .post-date, time {
    color: var(--cq-white) !important;
  }

  /* HEADINGS → RED */
  h1, h2, h3, h4, h5, h6 {
    color: var(--cq-red) !important;
  }
  .post-title,
  .post-title a,
  .post-title a:visited {
    color: var(--cq-red) !important;
  }

  /* GENERAL LINKS → MUTED GREEN */
  a, a:visited {
    color: var(--cq-green-muted) !important;
    text-decoration-color: var(--cq-green-muted) !important;
  }
  a:hover {
    color: var(--cq-red) !important;
  }

  /* MENU NAV → PURPLE */
  .navigation-menu a,
  .navigation-menu a:visited,
  .navigation-menu__inner a,
  .menu--desktop a,
  .menu--desktop a:visited {
    color: var(--cq-purple) !important;
    text-decoration-color: var(--cq-purple) !important;
  }
  .navigation-menu a:hover,
  .menu--desktop a:hover {
    color: var(--cq-red) !important;
  }

  /* TAGS → PURPLE */
  .post-tags a,
  .post-tags a:visited,
  span.post-tags a,
  ul.post-tags li a {
    color: var(--cq-purple) !important;
    text-decoration-color: var(--cq-purple) !important;
  }

  /* HEADER LINE → NEON GREEN (with subtle glow) */
  .header {
    border-bottom: 2px solid var(--cq-green-neon) !important;
    padding-bottom: 20px;
    margin-bottom: 30px;
    box-shadow: 0 2px 12px rgba(0, 255, 136, 0.3);
  }

  /* FOOTER LINE → MUTED GREEN */
  .footer {
    border-top: 1px solid var(--cq-green-muted) !important;
  }
  .footer a {
    color: var(--cq-green-muted) !important;
  }

  /* CODE */
  code {
    color: var(--cq-green-muted) !important;
  }

  /* ============================================
     HEADER LOGO
     ============================================ */
  .cq-header {
    display: flex;
    align-items: center;
  }

  .cq-logo-link {
    display: inline-flex !important;
    align-items: center;
    gap: 16px;
    text-decoration: none !important;
    padding: 0 !important;
    background: transparent !important;
    border: none !important;
  }

  .cq-logo-link,
  .cq-logo-link *,
  .header__logo,
  .header__inner .cq-logo-link,
  .framed {
    border: none !important;
    box-shadow: none !important;
  }

  .cq-logo-img {
    height: 56px;
    width: 56px;
    object-fit: contain;
    background: transparent !important;
    border: none !important;
    outline: none !important;
  }

  .cq-logo-text {
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--cq-red) !important;
    text-shadow: 0 0 10px rgba(255, 62, 62, 0.4);
  }

  /* BLINKING CURSOR → NEON GREEN (pops next to CYBERQUESTOR) */
  .cq-blink {
    animation: cq-blink 1s step-end infinite;
    margin-left: 4px;
    color: var(--cq-green-neon) !important;
    text-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
  }

  @keyframes cq-blink {
    50% { opacity: 0; }
  }

  @media (max-width: 684px) {
    .cq-logo-text {
      font-size: 22px;
      letter-spacing: 2px;
    }
    .cq-logo-img {
      height: 40px;
      width: 40px;
    }
  }
</style>
